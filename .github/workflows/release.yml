name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build release binary
        run: swift build -c release

      - name: Package .app bundle
        run: ./build_app.sh

      - name: Create DMG
        run: |
          DMG_STAGING="/tmp/snything-dmg-staging"
          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R ".build/Snything.app" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create \
            -volname "Snything" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            ".build/Snything-Release.dmg"
          rm -rf "$DMG_STAGING"
          echo "DMG created:"
          ls -lh ".build/Snything-Release.dmg"

      # Continuous pre-release: updated on every push to main
      - name: Update Continuous Release
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Updating continuous pre-release..."
          gh release delete continuous --yes 2>/dev/null || true
          git push origin :refs/tags/continuous 2>/dev/null || true
          git tag -f continuous "${{ github.sha }}"
          git push origin continuous --force
          NOTES_FILE="/tmp/release_notes.md"
          printf '%s\n\n- Commit: \`%s\`\n- Date: %s UTC\n' \
            "Automated build from latest commit on main." \
            "${{ github.sha }}" \
            "$(date -u +'%Y-%m-%d %H:%M:%S')" \
            > "$NOTES_FILE"
          gh release create continuous \
            ".build/Snything-Release.dmg" \
            --title "Snything Continuous Build" \
            --notes-file "$NOTES_FILE" \
            --prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tagged release: created only on version tags (e.g., v1.0.0)
      - name: Create Tagged Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "Creating release ${VERSION}..."
          gh release create "$VERSION" \
            ".build/Snything-Release.dmg" \
            --title "Snything ${VERSION}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
