name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Compute version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VER="${TAG#v}"
          else
            # Get highest v1.0.x tag, numeric sort to avoid string ordering issues
            LATEST=$(gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null | grep '^v1\.0\.' | sort -t. -k3 -n | tail -1 || echo "")
            if [ -n "$LATEST" ]; then
              CURRENT=$(echo "$LATEST" | sed -E 's/^v1\.0\.([0-9]+)$/\1/')
              NEXT=$((CURRENT + 1))
            else
              NEXT=0
            fi
            TAG="v1.0.${NEXT}"
            VER="1.0.${NEXT}"
          fi
          echo "APP_VERSION=$VER" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "Version: $VER  Tag: $TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release binary
        run: swift build -c release

      - name: Package .app bundle
        run: .github/build_app.sh
        env:
          APP_VERSION: ${{ env.APP_VERSION }}

      - name: Create DMG with create-dmg
        run: |
          brew install create-dmg

          DMG_STAGING="/tmp/snything-dmg-staging"
          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R ".build/Snything.app" "$DMG_STAGING/"

          # Background is bundled inside the app, extract for create-dmg
          BG_PATH=".build/Snything.app/Contents/Resources/DMGBackground.png"
          if [ ! -f "$BG_PATH" ]; then
            echo "Warning: DMGBackground.png not found, falling back to plain DMG"
            ln -s /Applications "$DMG_STAGING/Applications"
            hdiutil create -volname "Snything" -srcfolder "$DMG_STAGING" -ov -format UDZO ".build/Snything-Release.dmg"
          else
            create-dmg \
              --volname "Snything" \
              --window-size 660 420 \
              --background "$BG_PATH" \
              --icon-size 96 \
              --text-size 14 \
              --icon "Snything.app" 180 220 \
              --app-drop-link 480 220 \
              --format UDZO \
              --no-internet-enable \
              ".build/Snything-Release.dmg" \
              "$DMG_STAGING/Snything.app"
          fi

          rm -rf "$DMG_STAGING"
          echo "DMG created:"
          ls -lh ".build/Snything-Release.dmg"

      - name: Generate Changelog
        id: changelog
        run: |
          TAG_RANGE=""
          PREV_TAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG_RANGE="HEAD~20..HEAD"
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          else
            PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.sha }}^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              TAG_RANGE="${PREV_TAG}..HEAD"
            else
              TAG_RANGE="HEAD~20..HEAD"
            fi
          fi

          NOTES_FILE="/tmp/release_notes.md"
          COMMIT_COUNT=$(git rev-list --count "$TAG_RANGE" 2>/dev/null || echo "0")
          CONTRIBUTORS=$(git log --pretty=format:"%an" "$TAG_RANGE" 2>/dev/null | sort -u | sed '/^$/d' | paste -sd ", " - || echo "")

          # ──── Write beautiful release notes ────
          cat > "$NOTES_FILE" <<EOF
          <!-- Auto-generated release notes for Snything -->

          ## What's New

          This release includes **${COMMIT_COUNT} commits** with improvements to search, clipboard history, and the update experience.

          EOF

          # --- Features ---
          FEATS=$(git log --pretty=format:"- %s" "$TAG_RANGE" --grep="^feat" -- 2>/dev/null | sed 's/feat: //g; s/feat(\([^)]*\)): /\1: /g')
          if [ -n "$FEATS" ]; then
            cat >> "$NOTES_FILE" <<EOF
          ### ✨ Features

          ${FEATS}

          EOF
          fi

          # --- Bug Fixes ---
          FIXES=$(git log --pretty=format:"- %s" "$TAG_RANGE" --grep="^fix" -- 2>/dev/null | sed 's/fix: //g; s/fix(\([^)]*\)): /\1: /g')
          if [ -n "$FIXES" ]; then
            cat >> "$NOTES_FILE" <<EOF
          ### 🐛 Bug Fixes

          ${FIXES}

          EOF
          fi

          # --- Refactors ---
          REFACTORS=$(git log --pretty=format:"- %s" "$TAG_RANGE" --grep="^refactor" -- 2>/dev/null | sed 's/refactor: //g; s/refactor(\([^)]*\)): /\1: /g')
          if [ -n "$REFACTORS" ]; then
            cat >> "$NOTES_FILE" <<EOF
          ### 🔧 Refactors

          ${REFACTORS}

          EOF
          fi

          # --- CI / Build ---
          CI=$(git log --pretty=format:"- %s" "$TAG_RANGE" --grep="^ci" -- 2>/dev/null | sed 's/ci: //g; s/ci(\([^)]*\)): /\1: /g')
          if [ -n "$CI" ]; then
            cat >> "$NOTES_FILE" <<EOF
          ### 🏗️ CI / Build

          ${CI}

          EOF
          fi

          # --- Other ---
          OTHER=$(git log --pretty=format:"- %s" "$TAG_RANGE" 2>/dev/null | grep -v "^\- feat" | grep -v "^\- fix" | grep -v "^\- refactor" | grep -v "^\- chore" | grep -v "^\- ci" || true)
          if [ -n "$OTHER" ]; then
            cat >> "$NOTES_FILE" <<EOF
          ### 📝 Other Changes

          ${OTHER}

          EOF
          fi

          # --- Footer ---
          cat >> "$NOTES_FILE" <<EOF
          ## Installation

          1. Download \`Snything-Release.dmg\` below
          2. Open the DMG and drag **Snything** to **Applications**
          3. Launch Snything and enjoy!

          ## System Requirements

          - macOS 13.0 (Ventura) or later
          - Apple Silicon or Intel Mac

          EOF

          if [ -n "$CONTRIBUTORS" ]; then
            echo "## Contributors" >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            echo "Thanks to ${CONTRIBUTORS} for their contributions." >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
          fi

          cat >> "$NOTES_FILE" <<EOF
          ---
          **Commit:** \`${{ github.sha }}\`
          **Full Changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.sha }}
          EOF

          cat "$NOTES_FILE"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Auto-release on every push to main: version 1.0.{int}
      - name: Create or Update Versioned Release
        if: github.ref == 'refs/heads/main'
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          TITLE="version ${{ env.APP_VERSION }}"

          # Check if release already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating asset and notes..."
            gh release upload "$TAG" ".build/Snything-Release.dmg" --clobber
            gh release edit "$TAG" --title "$TITLE" --notes-file "/tmp/release_notes.md"
          else
            echo "Creating release ${TITLE} (tag ${TAG})..."
            gh release create "$TAG" \
              ".build/Snything-Release.dmg" \
              --title "$TITLE" \
              --notes-file "/tmp/release_notes.md"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tagged release: created only on version tags (e.g., v1.0.0)
      - name: Create or Update Tagged Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${{ env.RELEASE_TAG }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating asset and notes..."
            gh release upload "$TAG" ".build/Snything-Release.dmg" --clobber
            gh release edit "$TAG" --title "Snything ${TAG}" --notes-file "/tmp/release_notes.md"
          else
            echo "Creating release ${TAG}..."
            gh release create "$TAG" \
              ".build/Snything-Release.dmg" \
              --title "Snything ${TAG}" \
              --notes-file "/tmp/release_notes.md"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
