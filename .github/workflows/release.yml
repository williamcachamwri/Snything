name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build release binary
        run: swift build -c release

      - name: Package .app bundle
        run: .github/build_app.sh

      - name: Create DMG
        run: |
          DMG_STAGING="/tmp/snything-dmg-staging"
          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R ".build/Snything.app" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create \
            -volname "Snything" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            ".build/Snything-Release.dmg"
          rm -rf "$DMG_STAGING"
          echo "DMG created:"
          ls -lh ".build/Snything-Release.dmg"

      - name: Generate Changelog
        id: changelog
        run: |
          TAG_RANGE=""
          PREV_TAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG_RANGE="HEAD~20..HEAD"
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          else
            PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.sha }}^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              TAG_RANGE="${PREV_TAG}..HEAD"
            else
              TAG_RANGE="HEAD~20..HEAD"
            fi
          fi

          NOTES_FILE="/tmp/release_notes.md"
          COMMIT_COUNT=$(git rev-list --count "$TAG_RANGE" 2>/dev/null || echo "0")
          CONTRIBUTORS=$(git log --pretty=format:"%an" "$TAG_RANGE" 2>/dev/null | sort -u | sed '/^$/d' | paste -sd ", " - || echo "")

          # ──── Write beautiful release notes ────
          cat > "$NOTES_FILE" <<EOF
          <!-- Auto-generated release notes for Snything -->

          ## What's New

          This release includes **${COMMIT_COUNT} commits** with improvements to search, clipboard history, and the update experience.

          EOF

          # --- Features ---
          FEATS=$(git log --pretty=format:"- %s" "$TAG_RANGE" --grep="^feat" -- 2>/dev/null | sed 's/feat: //g; s/feat(\([^)]*\)): /\1: /g')
          if [ -n "$FEATS" ]; then
            cat >> "$NOTES_FILE" <<EOF
          ### ✨ Features

          ${FEATS}

          EOF
          fi

          # --- Bug Fixes ---
          FIXES=$(git log --pretty=format:"- %s" "$TAG_RANGE" --grep="^fix" -- 2>/dev/null | sed 's/fix: //g; s/fix(\([^)]*\)): /\1: /g')
          if [ -n "$FIXES" ]; then
            cat >> "$NOTES_FILE" <<EOF
          ### 🐛 Bug Fixes

          ${FIXES}

          EOF
          fi

          # --- Refactors ---
          REFACTORS=$(git log --pretty=format:"- %s" "$TAG_RANGE" --grep="^refactor" -- 2>/dev/null | sed 's/refactor: //g; s/refactor(\([^)]*\)): /\1: /g')
          if [ -n "$REFACTORS" ]; then
            cat >> "$NOTES_FILE" <<EOF
          ### 🔧 Refactors

          ${REFACTORS}

          EOF
          fi

          # --- CI / Build ---
          CI=$(git log --pretty=format:"- %s" "$TAG_RANGE" --grep="^ci" -- 2>/dev/null | sed 's/ci: //g; s/ci(\([^)]*\)): /\1: /g')
          if [ -n "$CI" ]; then
            cat >> "$NOTES_FILE" <<EOF
          ### 🏗️ CI / Build

          ${CI}

          EOF
          fi

          # --- Other ---
          OTHER=$(git log --pretty=format:"- %s" "$TAG_RANGE" 2>/dev/null | grep -v "^\- feat" | grep -v "^\- fix" | grep -v "^\- refactor" | grep -v "^\- chore" | grep -v "^\- ci" || true)
          if [ -n "$OTHER" ]; then
            cat >> "$NOTES_FILE" <<EOF
          ### 📝 Other Changes

          ${OTHER}

          EOF
          fi

          # --- Footer ---
          cat >> "$NOTES_FILE" <<EOF
          ## Installation

          1. Download \`Snything-Release.dmg\` below
          2. Open the DMG and drag **Snything** to **Applications**
          3. Launch Snything and enjoy!

          ## System Requirements

          - macOS 13.0 (Ventura) or later
          - Apple Silicon or Intel Mac

          EOF

          if [ -n "$CONTRIBUTORS" ]; then
            echo "## Contributors" >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            echo "Thanks to ${CONTRIBUTORS} for their contributions." >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
          fi

          cat >> "$NOTES_FILE" <<EOF
          ---
          **Commit:** \`${{ github.sha }}\`
          **Full Changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.sha }}
          EOF

          cat "$NOTES_FILE"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Auto-release on every push to main: version 1.0.{int}
      - name: Create Versioned Release
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Computing next version..."

          # Get the latest release tag matching v1.0.*
          LATEST=$(gh release list --limit 30 --json tagName --jq '.[].tagName' 2>/dev/null | grep '^v1\.0\.' | head -1 || echo "")

          if [ -n "$LATEST" ]; then
            # Extract the integer part: v1.0.5 → 5
            CURRENT=$(echo "$LATEST" | sed -E 's/^v1\.0\.([0-9]+)$/\1/')
            NEXT=$((CURRENT + 1))
          else
            NEXT=0
          fi

          TAG="v1.0.${NEXT}"
          TITLE="version 1.0.${NEXT}"

          echo "Creating release ${TITLE} (tag ${TAG})..."
          gh release create "$TAG" \
            ".build/Snything-Release.dmg" \
            --title "$TITLE" \
            --notes-file "/tmp/release_notes.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tagged release: created only on version tags (e.g., v1.0.0)
      - name: Create Tagged Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "Creating release ${VERSION}..."
          gh release create "$VERSION" \
            ".build/Snything-Release.dmg" \
            --title "Snything ${VERSION}" \
            --notes-file "/tmp/release_notes.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
