name: Auto Release

on:
  # Trigger 1: Manual (GitHub Actions UI)
  workflow_dispatch:

  # Trigger 2: Commit message contains [release]
  push:
    branches:
      - main

jobs:
  should-release:
    runs-on: macos-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if should release
        id: check
        run: |
          # Trigger 1: manual (workflow_dispatch) → always release
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — releasing"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Trigger 2: check commit message for [release]
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qiE '\[release\]|\[ship\]|\[deploy\]'; then
            echo "Commit message trigger: [$COMMIT_MSG]"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Trigger 3: check if latest release is old (build script version changed)
          LATEST=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | python3 -c "import sys,json; print(json.load(sys.stdin).get('tag_name','v0.0.0').lstrip('v'))")
          CURRENT=$(grep 'APP_VERSION=' .github/build_app.sh | sed 's/.*APP_VERSION="\${APP_VERSION:-\([^}]*\)}".*/\1/')

          # Parse and compare
          python3 << PYEOF
          import os, sys

          def parse(v):
              parts = v.strip().split('.')
              return tuple(int(p) for p in parts)

          latest = parse("$LATEST")
          current = parse("$CURRENT")

          if current > latest:
              print(f"build_app.sh version {'.'.join(map(str,current))} > latest release {'.'.join(map(str,latest))} → releasing")
              print("should_run=true")
          else:
              print(f"build_app.sh version {'.'.join(map(str,current))} <= latest release {'.'.join(map(str,latest))} → skipping")
              print("should_run=false")
          PYEOF

      - name: Bump version
        id: bump
        if: steps.check.outputs.should_run == 'true'
        run: |
          LATEST=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | python3 -c "import sys,json; t=json.load(sys.stdin).get('tag_name','v1.0.0'); print(t.lstrip('v'))")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          PATCH=$((PATCH + 1))
          if [ "$PATCH" -gt 100 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi
          if [ "$MINOR" -gt 20 ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
          fi
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "new_tag=v$NEW" >> $GITHUB_OUTPUT
          echo "Bumped: $LATEST -> $NEW"

          # Update build_app.sh
          sed -i.bak "s/APP_VERSION=\"\${APP_VERSION:-[^\"]*}\"/APP_VERSION=\"\${APP_VERSION:-$NEW}\"/" .github/build_app.sh
          rm -f .github/build_app.sh.bak

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/build_app.sh
          git commit -m "chore: auto-bump version to $NEW [release]"
          git push origin HEAD:main

  build-and-release:
    needs: should-release
    if: needs.should-release.outputs.should_run == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build .app bundle
        run: bash .github/build_app.sh
        env:
          APP_VERSION: ${{ needs.should-release.outputs.new_version }}

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Snything Installer" \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            --icon "Snything.app" 150 185 \
            --hide-extension "Snything.app" \
            "Snything-Release.dmg" \
            ".build/Snything.app" || true
          if [ ! -f "Snything-Release.dmg" ]; then
            hdiutil create -srcfolder ".build/Snything.app" -volname "Snything" -fs HFS+ -format UDZO "Snything-Release.dmg"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.should-release.outputs.new_tag }}
          name: "version ${{ needs.should-release.outputs.new_version }}"
          files: Snything-Release.dmg
          generate_release_notes: true

      - name: Update appcast.xml
        run: |
          VERSION=${{ needs.should-release.outputs.new_version }}
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")

          RELEASE_NOTES=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | python3 -c "import sys,json; b=json.load(sys.stdin).get('body',''); print(b[:2000] if b else '')")
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="<ul><li>Bug fixes and improvements.</li></ul>"
          fi

          cat > /tmp/new_item.xml << EOF
              <item>
                <title>Version $VERSION</title>
                <description><![CDATA[
                  <h2>What's New</h2>
                  $RELEASE_NOTES
                ]]></description>
                <pubDate>$PUB_DATE</pubDate>
                <enclosure url="https://github.com/${{ github.repository }}/releases/download/v$VERSION/Snything-Release.dmg" sparkle:version="${VERSION##*.}" sparkle:shortVersionString="$VERSION" length="0" type="application/octet-stream" sparkle:edSignature=""/>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
              </item>
          EOF

          python3 << 'PYEOF'
          with open("appcast.xml", "r") as f:
              content = f.read()
          with open("/tmp/new_item.xml", "r") as f:
              new_item = f.read()
          marker = "<language>en</language>"
          if marker in content:
              content = content.replace(marker, marker + "\n" + new_item, 1)
              with open("appcast.xml", "w") as f:
                  f.write(content)
              print("appcast.xml updated.")
          else:
              print("Error: could not find <language>en</language>")
              exit(1)
          PYEOF

      - name: Commit appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --cached --quiet || (git commit -m "chore: update appcast.xml for ${{ needs.should-release.outputs.new_tag }} [release]" && git push origin HEAD:main)
